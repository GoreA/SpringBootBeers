spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/restdb?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC
spring.jpa.database=mysql
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.datasource.hikari.pool-name=RestDB-Pool
spring.datasource.hikari.maximum-pool-size=5
#helps to reduce the number of round-trips between the application and the database, improving performance.
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.useLocalSessionState=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
spring.datasource.hikari.data-source-properties.maintainTimeStats=false

#Set Hibernate DDL-auto
#validate value for PROD
spring.jpa.hibernate.ddl-auto=validate

#Enable Flyway for local MySQL so migrations create tables before Hibernate validates
spring.flyway.enabled=true

#Show SQL in console
spring.jpa.show-sql=true

#Format SQL in console
spring.jpa.properties.hibernate.format_sql=true

#Show binding parameters in console
#logging.level.org.hibernate.orm.jdbc.bind=trace