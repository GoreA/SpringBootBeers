spring.application.name=spring-7-rest-mvc
spring.web.error.include-stacktrace=never
spring.web.error.include-binding-errors=never 
spring.web.error.include-exception=false 
spring.web.error.include-message=always 
spring.web.error.path=error 
server.web.error.whitelabel.enabled=true
server.web.error.include-sql-exception=false

logging.level.guru.spring.spring7restmvc = debug
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=drop-and-create
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-source=metadata
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.drop-target=drop-and-create.sql
#spring.jpa.properties.jakarta.persistence.schema-generation.scripts.create-target=drop-and-create.sql

# Disable Flyway for H2 in-memory database for testing, as a default behavior,
# since H2 is used for testing and we may not want to run migrations on
# an in-memory database.
spring.flyway.enabled=false

spring.security.user.name=user
spring.security.user.password=password